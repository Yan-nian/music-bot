<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot - 账号管理</title>
    <style>
        /* 复用 design tokens */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-sidebar: #1e293b;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --text-tertiary: var(--gray-400);
            --text-sidebar: #e2e8f0;
            --text-sidebar-muted: var(--gray-400);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --radius-md: 10px;
            --radius-lg: 16px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app-layout { display: flex; min-height: 100vh; }
        
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header { padding: var(--space-6); border-bottom: 1px solid rgba(255,255,255,0.08); }
        
        .sidebar-brand { display: flex; align-items: center; gap: var(--space-3); }
        
        .sidebar-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-title { font-size: 1.1rem; font-weight: 700; }
        .sidebar-subtitle { font-size: 0.75rem; color: var(--text-sidebar-muted); }
        
        .sidebar-nav { flex: 1; padding: var(--space-4); overflow-y: auto; }
        
        .nav-section { margin-bottom: var(--space-6); }
        
        .nav-section-title {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-sidebar-muted);
            padding: var(--space-2) var(--space-3);
        }
        
        .nav-item {
            display: flex; align-items: center; gap: var(--space-3);
            width: 100%; padding: 10px var(--space-3);
            border: none; background: transparent;
            color: var(--text-sidebar); border-radius: var(--radius-md);
            cursor: pointer; font-size: 0.9rem; text-align: left;
            transition: all var(--transition-fast);
            margin-bottom: 2px; text-decoration: none;
        }
        
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: var(--primary); color: white; font-weight: 500; }
        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        
        /* 主内容区 */
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
        
        .topbar {
            background: var(--bg-card); border-bottom: 1px solid var(--gray-200);
            padding: 0 var(--space-8); height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        
        .topbar-title { font-size: 1.2rem; font-weight: 600; }
        
        .content-wrapper { padding: var(--space-8); max-width: 1400px; margin: 0 auto; }
        
        /* 卡片 */
        .card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200);
            overflow: hidden; margin-bottom: var(--space-6);
        }
        
        .card-header {
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .card-title { font-size: 1rem; font-weight: 600; }
        .card-body { padding: var(--space-6); }
        
        /* 表单 */
        .form-group { margin-bottom: var(--space-5); }
        
        .form-label {
            display: block; font-size: 0.875rem; font-weight: 500;
            color: var(--text-primary); margin-bottom: var(--space-2);
        }
        
        .form-input {
            width: 100%; padding: 10px var(--space-4);
            border: 1.5px solid var(--gray-300); border-radius: var(--radius-md);
            font-size: 0.9rem; color: var(--text-primary); background: var(--bg-card);
            transition: all var(--transition-fast);
        }
        
        .form-input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-hint { font-size: 0.8rem; color: var(--text-tertiary); margin-top: var(--space-1); }
        
        /* 按钮 */
        .btn {
            display: inline-flex; align-items: center; gap: var(--space-2);
            padding: 10px 20px; border: none; border-radius: var(--radius-md);
            font-size: 0.9rem; font-weight: 500; cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        
        .btn-secondary { background: var(--gray-100); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--gray-200); }
        
        /* 头像 */
        .avatar {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        /* 权限标签 */
        .permission-tag {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 9999px;
            font-size: 0.8rem; font-weight: 500;
            background: var(--gray-100); color: var(--text-secondary);
        }
        
        .permission-tag.active { background: #d1fae5; color: #065f46; }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">🎵</div>
                    <div>
                        <div class="sidebar-title">Music Bot</div>
                        <div class="sidebar-subtitle">v2.0</div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要功能</div>
                    <a href="/" class="nav-item">
                        <span class="nav-icon">📊</span>
                        <span>仪表盘</span>
                    </a>
                    <a href="/settings" class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">数据管理</div>
                    <a href="/history" class="nav-item">
                        <span class="nav-icon">📜</span>
                        <span>下载历史</span>
                    </a>
                    <a href="/playlists" class="nav-item">
                        <span class="nav-icon">📀</span>
                        <span>歌单订阅</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">系统</div>
                    <a href="/logs" class="nav-item">
                        <span class="nav-icon">📝</span>
                        <span>系统日志</span>
                    </a>
                    <a href="/account" class="nav-item active">
                        <span class="nav-icon">👤</span>
                        <span>账号管理</span>
                    </a>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">👤 账号管理</div>
            </header>
            
            <div class="content-wrapper">
                <!-- 用户信息 -->
                <div class="card">
                    <div class="card-body">
                        <div style="display: flex; gap: var(--space-8); align-items: center;">
                            <div class="avatar" id="userAvatar">A</div>
                            
                            <div style="flex: 1;">
                                <div style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: var(--space-1);" id="usernameDisplay">Admin</div>
                                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: var(--space-3);" id="userRole">管理员</div>
                                
                                <div style="display: flex; gap: var(--space-2); flex-wrap: wrap;">
                                    <span class="permission-tag active">✅ 下载管理</span>
                                    <span class="permission-tag active">✅ 配置管理</span>
                                    <span class="permission-tag active">✅ 日志查看</span>
                                </div>
                            </div>
                            
                            <div style="text-align: right; font-size: 0.85rem; color: var(--text-tertiary);">
                                <div>最后登录</div>
                                <div id="lastLogin">2026-07-06 16:00</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 修改密码 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🔒 修改密码</div>
                    </div>
                    <div class="card-body">
                        <div style="max-width: 400px;">
                            <div class="form-group">
                                <label class="form-label">当前密码</label>
                                <input type="password" class="form-input" id="currentPassword" placeholder="输入当前密码">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">新密码</label>
                                <input type="password" class="form-input" id="newPassword" placeholder="输入新密码" oninput="checkPasswordStrength()">
                                <div class="form-hint">
                                    密码强度：<span id="passwordStrength" style="font-weight: 600;">-</span>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">确认新密码</label>
                                <input type="password" class="form-input" id="confirmPassword" placeholder="再次输入新密码">
                                <div class="form-hint" id="passwordMatch"></div>
                            </div>
                            
                            <button class="btn btn-primary" onclick="changePassword()">💾 保存新密码</button>
                        </div>
                    </div>
                </div>
                
                <!-- 会话管理 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🔐 会话管理</div>
                    </div>
                    <div class="card-body">
                        <div style="margin-bottom: var(--space-4);">
                            <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: var(--space-3);">
                                当前会话：<strong>192.168.1.100</strong> · Chrome · Windows
                            </div>
                            <button class="btn btn-secondary" onclick="renewSession()">🔄 续期会话</button>
                            <button class="btn btn-secondary" onclick="logoutAll()" style="margin-left: var(--space-3);">🚪 登出所有设备</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthEl = document.getElementById('passwordStrength');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            const levels = ['弱', '一般', '强', '非常强'];
            const colors = ['#ef4444', '#f59e0b', '#10b981', '#059669'];
            
            if (password.length === 0) {
                strengthEl.textContent = '-';
                strengthEl.style.color = 'var(--text-tertiary)';
            } else {
                strengthEl.textContent = levels[strength - 1] || '弱';
                strengthEl.style.color = colors[strength - 1] || '#ef4444';
            }
        }
        
        // 修改密码
        async function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!current || !newPwd || !confirm) {
                showToast('❌ 请填写所有字段', 'error');
                return;
            }
            
            if (newPwd !== confirm) {
                showToast('❌ 新密码不一致', 'error');
                return;
            }
            
            if (newPwd.length < 6) {
                showToast('❌ 密码至少 6 位', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/account/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: current,
                        new_password: newPwd
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 密码修改成功', 'success');
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showToast('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showToast('❌ 网络错误', 'error');
            }
        }
        
        // 续期会话
        function renewSession() {
            showToast('✅ 会话已续期', 'success');
        }
        
        // 登出所有设备
        function logoutAll() {
            if (confirm('确定要登出所有设备吗？')) {
                showToast('✅ 已登出所有设备', 'success');
            }
        }
        
        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; right: 20px;
                padding: 16px 24px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white; border-radius: 10px;
                box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // 添加动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
