<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理 - Music Bot</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --accent: #007AFF;
            --accent-hover: #0056b3;
            --accent-soft: #e8f1ff;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color); color: var(--text-primary);
            min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased;
        }
        .app { display: flex; min-height: 100vh; }

        /* 侧边栏 */
        .sidebar { width: 248px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; flex-shrink: 0; }
        .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
        .sidebar-header h1 { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sidebar-header p { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .nav-list { padding: 10px 10px; flex: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text-primary); text-align: left; transition: background 0.15s; margin-bottom: 2px; text-decoration: none; }
        .nav-item:hover { background: var(--bg-color); }
        .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
        .nav-item .nav-icon { font-size: 1.05rem; width: 22px; text-align: center; }
        .nav-item .nav-label { flex: 1; }
        .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }
        .sidebar-footer a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; text-decoration: none; color: var(--text-secondary); font-size: 0.85rem; transition: background 0.15s; }
        .sidebar-footer a:hover { background: var(--bg-color); color: var(--text-primary); }
        .sidebar-footer a.active-page { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
        .sidebar-footer a.danger:hover { background: #fff0f0; color: var(--danger); }

        /* 内容区 */
        .content { flex: 1; min-width: 0; padding: 28px 32px 80px; }
        .content-inner { max-width: 680px; margin: 0 auto; }
        .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; flex-wrap: wrap; }
        .content-header h2 { font-size: 1.4rem; font-weight: 600; }
        .menu-toggle { display: none; }

        /* 卡片 */
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
        }
        .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 16px; }

        /* 用户信息 */
        .user-info {
            display: flex; align-items: center; gap: 16px; padding: 20px;
            background: linear-gradient(135deg, var(--accent) 0%, #5856d6 100%);
            border-radius: var(--radius); color: #fff; margin-bottom: 16px;
        }
        .user-avatar {
            width: 56px; height: 56px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            flex-shrink: 0;
        }
        .user-details h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: 3px; }
        .user-details p { opacity: 0.85; font-size: 0.83rem; }

        /* 表单 */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 9px 12px; border: 1px solid var(--border);
            border-radius: 9px; font-size: 0.88rem; font-family: inherit;
            color: var(--text-primary); background: #fbfbfd; transition: all 0.15s;
        }
        input:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }
        input::placeholder { color: var(--text-tertiary); }
        input:disabled { background: var(--bg-color); cursor: not-allowed; }

        /* 按钮 */
        .btn { padding: 9px 18px; border: none; border-radius: 9px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-color); color: var(--text-primary); } .btn-secondary:hover { background: #ecedf0; }
        .btn-danger { background: #fff0f0; color: var(--danger); } .btn-danger:hover { background: #ffe0e0; }
        .btn-row { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }

        /* 密码强度 */
        .password-strength { margin-top: 6px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
        .password-strength-bar { height: 100%; width: 0%; transition: all 0.25s; border-radius: 2px; }
        .password-strength-bar.weak { width: 33%; background: var(--danger); }
        .password-strength-bar.medium { width: 66%; background: var(--warning); }
        .password-strength-bar.strong { width: 100%; background: var(--success); }
        .password-hint { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }

        /* 安全提示列表 */
        .tip-list { color: var(--text-secondary); line-height: 2; padding-left: 18px; font-size: 0.85rem; }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(20px); background: #1d1d1f; color: #fff;
            padding: 11px 20px; border-radius: 10px; font-size: 0.85rem;
            opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 999;
            box-shadow: 0 6px 24px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }

        @media (max-width: 860px) {
            .sidebar { position: fixed; left: -260px; top: 0; z-index: 100; transition: left 0.25s; box-shadow: 2px 0 20px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            .menu-toggle { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 9px; background: #fff; cursor: pointer; font-size: 1.1rem; }
            .content { padding: 18px 16px 70px; }
            .btn-row { flex-direction: column; }
            .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
            .backdrop.show { display: block; }
        }
    </style>
</head>
<body>
<div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>
<div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><h1>🎵 Music Bot</h1><p>配置中心</p></div>
        <nav class="nav-list">
            <a class="nav-item" href="/"><span class="nav-icon">⚙️</span><span class="nav-label">配置管理</span></a>
            <a class="nav-item" href="/playlists"><span class="nav-icon">📋</span><span class="nav-label">歌单订阅</span></a>
            <a class="nav-item" href="/logs"><span class="nav-icon">📜</span><span class="nav-label">日志查看</span></a>
            <a class="nav-item active" href="/account"><span class="nav-icon">👤</span><span class="nav-label">账号管理</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="">⚙️ 配置管理</a>
            <a href="/playlists" class="">📋 歌单订阅</a>
            <a href="/logs" class="">📜 日志查看</a>
            <a href="/logout" class="danger">🚪 退出登录</a>
        </div>
    </aside>

    <!-- 内容区 -->
    <main class="content">
        <div class="content-inner">
            <div class="content-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <h2>👤 账号管理</h2>
                </div>
                <button class="btn btn-danger btn-small" onclick="handleLogout()">🚪 退出登录</button>
            </div>

            <!-- 用户信息 -->
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <h3 id="displayUsername">加载中...</h3>
                    <p>管理员账号</p>
                </div>
            </div>

            <!-- 修改用户名 -->
            <div class="card">
                <div class="card-title">✏️ 修改用户名</div>
                <div class="card-desc">更改您的登录用户名（至少 3 位字符）。</div>
                <form onsubmit="return handleChangeUsername(event)">
                    <div class="form-group">
                        <label for="newUsername">新用户名</label>
                        <input type="text" id="newUsername" placeholder="请输入新用户名（至少3位）" minlength="3" required>
                    </div>
                    <div class="form-group">
                        <label for="usernamePassword">确认密码</label>
                        <input type="password" id="usernamePassword" placeholder="请输入当前密码以确认身份" required>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="btn btn-primary">💾 保存用户名</button>
                    </div>
                </form>
            </div>

            <!-- 修改密码 -->
            <div class="card">
                <div class="card-title">🔑 修改密码</div>
                <div class="card-desc">更新您的登录密码（至少 4 位字符）。</div>
                <form onsubmit="return handleChangePassword(event)">
                    <div class="form-group">
                        <label for="currentPassword">当前密码</label>
                        <input type="password" id="currentPassword" placeholder="请输入当前密码" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <input type="password" id="newPassword" placeholder="请输入新密码（至少4位）" minlength="4" required
                               oninput="checkPasswordStrength(this.value)">
                        <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                        <p class="password-hint" id="strengthText">请输入新密码</p>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认新密码</label>
                        <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="btn btn-primary">🔄 更新密码</button>
                    </div>
                </form>
            </div>

            <!-- 安全提示 -->
            <div class="card">
                <div class="card-title">💡 安全提示</div>
                <div class="card-desc">保护您的账号安全</div>
                <ul class="tip-list">
                    <li>定期更换密码，建议每 3 个月更换一次</li>
                    <li>使用强密码：包含大小写字母、数字和特殊字符</li>
                    <li>不要在公共设备上勾选「记住我」</li>
                    <li>如发现账号异常，请立即修改密码</li>
                </ul>
            </div>
        </div>
    </main>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000)}
function toggleSidebar(open){const sb=document.getElementById('sidebar'),bd=document.getElementById('backdrop');const w=open===undefined?!sb.classList.contains('open'):open;sb.classList.toggle('open',w);bd.classList.toggle('show',w)}

function checkPasswordStrength(pwd){
    const bar=document.getElementById('strengthBar'), txt=document.getElementById('strengthText');
    let s=0;if(pwd.length>=4)s++;if(pwd.length>=8)s++;if(/[A-Z]/.test(pwd)&&/[a-z]/.test(pwd))s++;if(/[0-9]/.test(pwd))s++;if(/[^A-Za-z0-9]/.test(pwd))s++;
    bar.className='password-strength-bar';
    if(!pwd.length){txt.textContent='请输入新密码';bar.style.width='0%'}
    else if(s<=2){bar.classList.add('weak');txt.textContent='密码强度：弱'}
    else if(s<=3){bar.classList.add('medium');txt.textContent='密码强度：中'}
    else{bar.classList.add('strong');txt.textContent='密码强度：强'}
}

async function loadAuthStatus(){
    try{const r=await fetch('/api/auth/status'),d=await r.json();if(d.logged_in)document.getElementById('displayUsername').textContent=d.username||'admin';else location.href='/login'}catch(e){}
}
async function handleChangeUsername(e){
    e.preventDefault();
    const u=document.getElementById('newUsername').value.trim(), p=document.getElementById('usernamePassword').value;
    if(u.length<3){showToast('用户名至少3位','error');return false}
    try{const r=await fetch('/api/auth/change-username',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({new_username:u,password:p})}),d=await r.json();if(d.success){showToast('修改成功','success');document.getElementById('displayUsername').textContent=u;document.getElementById('newUsername').form.reset()}else showToast(d.error||'失败','error')}catch(e){showToast('网络错误','error')}
    return false;
}
async function handleChangePassword(e){
    e.preventDefault();
    const cur=document.getElementById('currentPassword').value,nw=document.getElementById('newPassword').value,cf=document.getElementById('confirmPassword').value;
    if(nw.length<4){showToast('密码至少4位','error');return false}
    if(nw!==cf){showToast('两次密码不一致','error');return false}
    try{const r=await fetch('/api/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:cur,new_password:nw,confirm_password:cf})}),d=await r.json();if(d.success){showToast('修改成功','success');document.getElementById('passwordForm').reset();document.getElementById('strengthBar').className='password-strength-bar';document.getElementById('strengthText').textContent='请输入新密码'}else showToast(d.error||'失败','error')}catch(e){showToast('网络错误','error')}
    return false;
}
async function handleLogout(){try{const r=await fetch('/api/auth/logout',{method:'POST'}),d=await r.json();location.href=d.redirect||'/login'}catch(e){}}
document.addEventListener('DOMContentLoaded',loadAuthStatus);
</script>
</body>
</html>
