<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot - 下载历史</title>
    <style>
        /* 复用 design tokens */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-sidebar: #1e293b;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --text-tertiary: var(--gray-400);
            --text-sidebar: #e2e8f0;
            --text-sidebar-muted: var(--gray-400);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --radius-md: 10px;
            --radius-lg: 16px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header { padding: var(--space-6); border-bottom: 1px solid rgba(255,255,255,0.08); }
        
        .sidebar-brand { display: flex; align-items: center; gap: var(--space-3); }
        
        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-title { font-size: 1.1rem; font-weight: 700; }
        
        .sidebar-subtitle { font-size: 0.75rem; color: var(--text-sidebar-muted); }
        
        .sidebar-nav { flex: 1; padding: var(--space-4); overflow-y: auto; }
        
        .nav-section { margin-bottom: var(--space-6); }
        
        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-sidebar-muted);
            padding: var(--space-2) var(--space-3);
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            width: 100%;
            padding: 10px var(--space-3);
            border: none;
            background: transparent;
            color: var(--text-sidebar);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            transition: all var(--transition-fast);
            margin-bottom: 2px;
            text-decoration: none;
        }
        
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        
        .nav-item.active { background: var(--primary); color: white; font-weight: 500; }
        
        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
        
        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 var(--space-8);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .topbar-title { font-size: 1.2rem; font-weight: 600; }
        
        .content-wrapper { padding: var(--space-8); max-width: 1400px; margin: 0 auto; }
        
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            margin-bottom: var(--space-6);
        }
        
        .card-header {
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-title { font-size: 1rem; font-weight: 600; }
        
        .card-body { padding: var(--space-6); }
        
        /* 表格 */
        .table-container { overflow-x: auto; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            padding: 12px var(--space-4);
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            border-bottom: 2px solid var(--gray-200);
            background: var(--gray-50);
        }
        
        td {
            padding: 16px var(--space-4);
            font-size: 0.9rem;
            border-bottom: 1px solid var(--gray-100);
            color: var(--text-secondary);
        }
        
        tr:hover { background: var(--gray-50); }
        
        /* 状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-badge.success { background: #d1fae5; color: #065f46; }
        .status-badge.failed { background: #fee2e2; color: #991b1b; }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        
        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--gray-100); }
        
        /* 筛选器 */
        .filters {
            display: flex;
            gap: var(--space-3);
            align-items: center;
        }
        
        .filter-input {
            padding: 8px 12px;
            border: 1.5px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        
        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">🎵</div>
                    <div>
                        <div class="sidebar-title">Music Bot</div>
                        <div class="sidebar-subtitle">v2.0</div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要功能</div>
                    <a href="/" class="nav-item">
                        <span class="nav-icon">📊</span>
                        <span>仪表盘</span>
                    </a>
                    <a href="/settings" class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">数据管理</div>
                    <a href="/history" class="nav-item active">
                        <span class="nav-icon">📜</span>
                        <span>下载历史</span>
                    </a>
                    <a href="/playlists" class="nav-item">
                        <span class="nav-icon">📀</span>
                        <span>歌单订阅</span>
                    </a>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">📜 下载历史</div>
                <div>
                    <button class="btn btn-ghost" onclick="exportHistory()">📥 导出记录</button>
                </div>
            </header>
            
            <div class="content-wrapper">
                <!-- 筛选器 -->
                <div class="card">
                    <div class="card-body">
                        <div class="filters">
                            <input type="text" class="filter-input" placeholder="🔍 搜索歌曲/专辑..." id="searchInput" oninput="filterHistory()">
                            
                            <select class="filter-input" id="statusFilter" onchange="filterHistory()">
                                <option value="">全部状态</option>
                                <option value="success">✅ 成功</option>
                                <option value="failed">❌ 失败</option>
                            </select>
                            
                            <select class="filter-input" id="platformFilter" onchange="filterHistory()">
                                <option value="">全部平台</option>
                                <option value="netease">网易云</option>
                                <option value="apple">Apple Music</option>
                            </select>
                            
                            <input type="date" class="filter-input" id="dateFrom" onchange="filterHistory()">
                            <span style="color: var(--text-tertiary);">至</span>
                            <input type="date" class="filter-input" id="dateTo" onchange="filterHistory()">
                            
                            <button class="btn btn-ghost" onclick="resetFilters()">🔄 重置</button>
                        </div>
                    </div>
                </div>
                
                <!-- 历史记录表格 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📋 下载记录</div>
                        <div style="color: var(--text-tertiary); font-size: 0.85rem;">
                            共 <span id="totalCount">0</span> 条记录
                        </div>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>时间</th>
                                        <th>平台</th>
                                        <th>类型</th>
                                        <th>名称</th>
                                        <th>状态</th>
                                        <th>大小</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="historyTable">
                                    <!-- 数据将通过 JS 填充 -->
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- 分页 -->
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-4) var(--space-6); border-top: 1px solid var(--gray-200);">
                            <div style="font-size: 0.85rem; color: var(--text-tertiary);">
                                显示 <span id="startIndex">1</span>-<span id="endIndex">10</span> 条，共 <span id="totalItems">0</span> 条
                            </div>
                            <div style="display: flex; gap: var(--space-2);">
                                <button class="btn btn-ghost" onclick="prevPage()">‹ 上一页</button>
                                <button class="btn btn-ghost" onclick="nextPage()">下一页 ›</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let currentPage = 1;
        const itemsPerPage = 10;
        let allHistory = [];
        let filteredHistory = [];
        
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/history?limit=1000');
                const result = await response.json();
                
                if (result.success) {
                    allHistory = result.data;
                    filterHistory();
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }
        
        // 筛选历史
        function filterHistory() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const platform = document.getElementById('platformFilter').value;
            
            filteredHistory = allHistory.filter(item => {
                if (search && !item.name.toLowerCase().includes(search)) return false;
                if (status && item.status !== status) return false;
                if (platform && item.platform !== platform) return false;
                return true;
            });
            
            currentPage = 1;
            renderTable();
        }
        
        // 渲染表格
        function renderTable() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredHistory.slice(start, end);
            
            const tbody = document.getElementById('historyTable');
            tbody.innerHTML = '';
            
            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 48px; color: var(--text-tertiary);">
                            <div style="font-size: 3rem; margin-bottom: 16px;">🎵</div>
                            <div>暂无下载记录</div>
                        </td>
                    </tr>
                `;
            } else {
                pageData.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${formatDate(item.timestamp)}</td>
                        <td>
                            <span style="font-size: 1.2rem;">${item.platform === 'netease' ? '🎵' : '🍎'}</span>
                            ${item.platform}
                        </td>
                        <td>${item.type === 'song' ? '🎶 单曲' : item.type === 'album' ? '💿 专辑' : '📀 歌单'}</td>
                        <td style="font-weight: 500; color: var(--text-primary);">${item.name}</td>
                        <td>
                            <span class="status-badge ${item.status}">
                                ${item.status === 'success' ? '✅' : '❌'}
                                ${item.status === 'success' ? '成功' : '失败'}
                            </span>
                        </td>
                        <td>${item.size || '-'}</td>
                        <td>
                            <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 0.8rem;" onclick="viewDetail('${item.id}')">查看</button>
                            <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 0.8rem;" onclick="redownload('${item.id}')">重下</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }
            
            // 更新计数
            document.getElementById('totalCount').textContent = filteredHistory.length;
            document.getElementById('startIndex').textContent = start + 1;
            document.getElementById('endIndex').textContent = Math.min(end, filteredHistory.length);
            document.getElementById('totalItems').textContent = filteredHistory.length;
        }
        
        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 重置筛选
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('platformFilter').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            filterHistory();
        }
        
        // 导出历史
        function exportHistory() {
            const csv = [
                ['时间', '平台', '类型', '名称', '状态', '大小'].join(','),
                ...filteredHistory.map(item => [
                    formatDate(item.timestamp),
                    item.platform,
                    item.type,
                    item.name,
                    item.status,
                    item.size || ''
                ].join(','))
            ].join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `music-bot-history-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }
        
        // 分页
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }
        
        function nextPage() {
            if (currentPage * itemsPerPage < filteredHistory.length) {
                currentPage++;
                renderTable();
            }
        }
        
        // 查看详情
        function viewDetail(id) {
            alert('查看详情: ' + id);
        }
        
        // 重新下载
        function redownload(id) {
            if (confirm('确定要重新下载吗？')) {
                alert('已开始重新下载');
            }
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
