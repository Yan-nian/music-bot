<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot - 系统日志</title>
    <style>
        /* 复用 design tokens */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-sidebar: #1e293b;
            --bg-dark: #1e293b;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --text-tertiary: var(--gray-400);
            --text-sidebar: #e2e8f0;
            --text-sidebar-muted: var(--gray-400);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --radius-md: 10px;
            --radius-lg: 16px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin:0; padding:0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app-layout { display: flex; min-height: 100vh; }
        
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header { padding: var(--space-6); border-bottom: 1px solid rgba(255,255,255,0.08); }
        
        .sidebar-brand { display: flex; align-items: center; gap: var(--space-3); }
        
        .sidebar-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-title { font-size: 1.1rem; font-weight: 700; }
        .sidebar-subtitle { font-size: 0.75rem; color: var(--text-sidebar-muted); }
        
        .sidebar-nav { flex: 1; padding: var(--space-4); overflow-y: auto; }
        
        .nav-section { margin-bottom: var(--space-6); }
        .nav-section-title {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-sidebar-muted);
            padding: var(--space-2) var(--space-3);
        }
        
        .nav-item {
            display: flex; align-items: center; gap: var(--space-3);
            width: 100%; padding: 10px var(--space-3);
            border: none; background: transparent;
            color: var(--text-sidebar); border-radius: var(--radius-md);
            cursor: pointer; font-size: 0.9rem; text-align: left;
            transition: all var(--transition-fast);
            margin-bottom: 2px; text-decoration: none;
        }
        
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: var(--primary); color: white; font-weight: 500; }
        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        
        /* 主内容区 */
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
        
        .topbar {
            background: var(--bg-card); border-bottom: 1px solid var(--gray-200);
            padding: 0 var(--space-8); height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        
        .topbar-title { font-size: 1.2rem; font-weight: 600; }
        
        .content-wrapper { padding: var(--space-8); max-width: 1400px; margin: 0 auto; }
        
        /* 卡片 */
        .card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200);
            overflow: hidden; margin-bottom: var(--space-6);
        }
        
        .card-header {
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .card-title { font-size: 1rem; font-weight: 600; }
        .card-body { padding: var(--space-6); }
        
        /* 日志容器 */
        .log-container {
            background: var(--bg-dark);
            border-radius: var(--radius-md);
            padding: var(--space-5);
            max-height: 600px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.8;
        }
        
        .log-line {
            display: flex; gap: var(--space-3);
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .log-time {
            color: var(--gray-400);
            font-size: 0.8rem;
            flex-shrink: 0;
            min-width: 80px;
        }
        
        .log-level {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 1px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
        }
        
        .log-level.info { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .log-level.warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .log-level.error { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .log-level.success { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        
        .log-message { color: #e2e8f0; flex: 1; }
        
        /* 按钮 */
        .btn {
            display: inline-flex; align-items: center; gap: var(--space-2);
            padding: 8px 16px; border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem; font-weight: 500;
            cursor: pointer; transition: all var(--transition-fast);
        }
        
        .btn-secondary { background: var(--gray-100); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--gray-200); }
        
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--gray-100); }
        
        /* 筛选器 */
        .filters {
            display: flex; gap: var(--space-3);
            align-items: center; flex-wrap: wrap;
        }
        
        .filter-input {
            padding: 8px 12px; border: 1.5px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: 0.85rem; color: var(--text-primary);
            background: var(--bg-card);
        }
        
        .filter-input:focus { outline: none; border-color: var(--primary); }
        
        .filter-btn {
            padding: 6px 12px; border: 1.5px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: 0.85rem; cursor: pointer;
            background: var(--bg-card); color: var(--text-secondary);
            transition: all var(--transition-fast);
        }
        
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .filter-btn:hover { border-color: var(--primary); }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">🎵</div>
                    <div>
                        <div class="sidebar-title">Music Bot</div>
                        <div class="sidebar-subtitle">v2.0</div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要功能</div>
                    <a href="/" class="nav-item">
                        <span class="nav-icon">📊</span>
                        <span>仪表盘</span>
                    </a>
                    <a href="/settings" class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">数据管理</div>
                    <a href="/history" class="nav-item">
                        <span class="nav-icon">📜</span>
                        <span>下载历史</span>
                    </a>
                    <a href="/playlists" class="nav-item">
                        <span class="nav-icon">📀</span>
                        <span>歌单订阅</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">系统</div>
                    <a href="/logs" class="nav-item active">
                        <span class="nav-icon">📝</span>
                        <span>系统日志</span>
                    </a>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">📝 系统日志</div>
                <div style="display: flex; gap: var(--space-3);">
                    <button class="btn btn-ghost" onclick="clearLogs()">🗑️ 清空日志</button>
                    <button class="btn btn-secondary" onclick="downloadLogs()">📥 下载日志</button>
                    <button class="btn btn-primary" onclick="toggleAutoRefresh()" id="refreshBtn">🔄 自动刷新: 开</button>
                </div>
            </header>
            
            <div class="content-wrapper">
                <!-- 筛选器 -->
                <div class="card">
                    <div class="card-body">
                        <div class="filters">
                            <select class="filter-input" id="levelFilter" onchange="filterLogs()">
                                <option value="">全部级别</option>
                                <option value="INFO">ℹ️ INFO</option>
                                <option value="WARNING">⚠️ WARNING</option>
                                <option value="ERROR">❌ ERROR</option>
                                <option value="SUCCESS">✅ SUCCESS</option>
                            </select>
                            
                            <input type="text" class="filter-input" placeholder="🔍 搜索关键词..." id="searchFilter" oninput="filterLogs()">
                            
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary);">
                                <input type="checkbox" id="autoScroll" checked> 自动滚动
                            </label>
                            
                            <span style="color: var(--text-tertiary); font-size: 0.85rem;">
                                共 <span id="logCount">0</span> 条
                            </span>
                        </div>
                    </div>
                </div>
                
                <!-- 日志显示 -->
                <div class="card">
                    <div class="card-body" style="padding: var(--space-4);">
                        <div class="log-container" id="logContainer">
                            <div style="text-align: center; padding: 48px; color: var(--gray-400);">
                                <div style="font-size: 3rem; margin-bottom: 16px;">📝</div>
                                <div>正在加载日志...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let allLogs = [];
        let filteredLogs = [];
        let autoRefresh = true;
        let refreshInterval;
        
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs?limit=500');
                const result = await response.json();
                
                if (result.success) {
                    allLogs = result.data;
                    filterLogs();
                }
            } catch (error) {
                console.error('加载日志失败:', error);
            }
        }
        
        // 筛选日志
        function filterLogs() {
            const level = document.getElementById('levelFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            filteredLogs = allLogs.filter(log => {
                if (level && log.level !== level) return false;
                if (search && !log.message.toLowerCase().includes(search)) return false;
                return true;
            });
            
            renderLogs();
        }
        
        // 渲染日志
        function renderLogs() {
            const container = document.getElementById('logContainer');
            
            if (filteredLogs.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 48px; color: var(--gray-400);">
                        <div style="font-size: 3rem; margin-bottom: 16px;">📝</div>
                        <div>暂无日志记录</div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
                
                filteredLogs.forEach(log => {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.innerHTML = `
                        <span class="log-time">${formatTime(log.timestamp)}</span>
                        <span class="log-level ${log.level.toLowerCase()}">${log.level}</span>
                        <span class="log-message">${escapeHtml(log.message)}</span>
                    `;
                    container.appendChild(line);
                });
                
                // 自动滚动到底部
                if (document.getElementById('autoScroll').checked) {
                    container.scrollTop = container.scrollHeight;
                }
            }
            
            document.getElementById('logCount').textContent = filteredLogs.length;
        }
        
        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        // 转义 HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 清空日志
        async function clearLogs() {
            if (!confirm('确定要清空所有日志吗？')) return;
            
            try {
                const response = await fetch('/api/logs/clear', {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    allLogs = [];
                    filterLogs();
                    showToast('✅ 日志已清空', 'success');
                }
            } catch (error) {
                showToast('❌ 清空失败', 'error');
            }
        }
        
        // 下载日志
        function downloadLogs() {
            const text = filteredLogs.map(log => 
                `[${formatTime(log.timestamp)}] [${log.level}] ${log.message}`
            ).join('\n');
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `music-bot-logs-${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
        }
        
        // 切换自动刷新
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('refreshBtn');
            
            if (autoRefresh) {
                btn.textContent = '🔄 自动刷新: 开';
                btn.style.background = 'var(--primary)';
                startAutoRefresh();
            } else {
                btn.textContent = '🔄 自动刷新: 关';
                btn.style.background = 'var(--gray-100)';
                clearInterval(refreshInterval);
            }
        }
        
        // 开始自动刷新
        function startAutoRefresh() {
            clearInterval(refreshInterval);
            refreshInterval = setInterval(loadLogs, 3000);  // 每 3 秒刷新
        }
        
        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; right: 20px;
                padding: 16px 24px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white; border-radius: 10px;
                box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            startAutoRefresh();
        });
    </script>
</body>
</html>
