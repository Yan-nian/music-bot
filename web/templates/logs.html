<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志查看 - Music Bot</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --accent: #007AFF;
            --accent-hover: #0056b3;
            --accent-soft: #e8f1ff;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color); color: var(--text-primary);
            min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased;
        }
        .app { display: flex; min-height: 100vh; }

        /* 侧边栏 */
        .sidebar { width: 248px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; flex-shrink: 0; }
        .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
        .sidebar-header h1 { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sidebar-header p { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .nav-list { padding: 10px 10px; flex: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text-primary); text-align: left; transition: background 0.15s; margin-bottom: 2px; text-decoration: none; }
        .nav-item:hover { background: var(--bg-color); }
        .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
        .nav-item .nav-icon { font-size: 1.05rem; width: 22px; text-align: center; }
        .nav-item .nav-label { flex: 1; }
        .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }
        .sidebar-footer a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; text-decoration: none; color: var(--text-secondary); font-size: 0.85rem; transition: background 0.15s; }
        .sidebar-footer a:hover { background: var(--bg-color); color: var(--text-primary); }
        .sidebar-footer a.active-page { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
        .sidebar-footer a.danger:hover { background: #fff0f0; color: var(--danger); }

        /* 内容区 */
        .content { flex: 1; min-width: 0; padding: 28px 32px 80px; }
        .content-inner { max-width: 1100px; margin: 0 auto; }
        .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; flex-wrap: wrap; }
        .content-header h2 { font-size: 1.4rem; font-weight: 600; }
        .menu-toggle { display: none; }

        /* 卡片 */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }

        /* 统计卡片 */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 3px; }
        .stat-card.info .stat-value { color: var(--accent); }
        .stat-card.warning .stat-value { color: var(--warning); }
        .stat-card.error .stat-value { color: var(--danger); }
        .stat-card.success .stat-value { color: var(--success); }

        /* 筛选 */
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 140px; }
        .filter-group label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 6px; }
        input, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 9px; font-size: 0.88rem; font-family: inherit; color: var(--text-primary); background: #fbfbfd; transition: border 0.15s, background 0.15s; }
        input:focus, select:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }

        /* 按钮 */
        .btn { padding: 9px 16px; border: none; border-radius: 9px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-color); color: var(--text-primary); } .btn-secondary:hover { background: #ecedf0; }
        .btn-success { background: var(--success); color: #fff; } .btn-success:hover { background: #2db84d; }
        .btn-warning { background: #fff3e6; color: var(--warning); } .btn-warning:hover { background: #ffe8cc; }
        .btn-danger { background: #fff0f0; color: var(--danger); } .btn-danger:hover { background: #ffe0e0; }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        /* 日志表格 */
        .log-table-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        .log-table th, .log-table td { padding: 11px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        .log-table th { background: var(--bg-color); font-weight: 600; color: var(--text-secondary); font-size: 0.75rem; letter-spacing: 0.4px; white-space: nowrap; }
        .log-table tbody tr:hover { background: rgba(0,0,0,0.02); }
        .log-table tr:last-child td { border-bottom: none; }

        .log-level { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
        .log-level.DEBUG { background: rgba(134,134,139,0.1); color: var(--text-secondary); }
        .log-level.INFO { background: var(--accent-soft); color: var(--accent); }
        .log-level.WARNING { background: rgba(255,149,0,0.1); color: var(--warning); }
        .log-level.ERROR { background: rgba(255,59,48,0.08); color: var(--danger); }

        .log-category { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; background: var(--bg-color); color: var(--text-secondary); }
        .log-category.metadata { background: rgba(88,86,214,0.08); color: #5856d6; }
        .log-category.download { background: rgba(52,199,89,0.08); color: var(--success); }
        .log-category.telegram { background: rgba(0,136,204,0.08); color: #0088cc; }

        .log-message { max-width: 480px; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem; }
        .log-time { font-size: 0.78rem; color: var(--text-secondary); white-space: nowrap; }

        /* 分页 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 18px; padding: 16px 0; }
        .pagination button { padding: 8px 16px; border: 1px solid var(--border); background: var(--card-bg); border-radius: 8px; cursor: pointer; font-size: 0.83rem; transition: all 0.15s; }
        .pagination button:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
        .pagination button:disabled { opacity: 0.45; cursor: not-allowed; }
        .page-info { padding: 8px 14px; color: var(--text-secondary); font-size: 0.83rem; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 50px 20px; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state h3 { font-size: 1.05rem; margin-bottom: 6px; }
        .empty-state p { color: var(--text-secondary); font-size: 0.85rem; }

        .loading { text-align: center; padding: 36px; color: var(--text-secondary); }
        .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1d1d1f; color: #fff; padding: 11px 20px; border-radius: 10px; font-size: 0.85rem; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 999; box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); } .toast.success { background: var(--success); }

        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: var(--radius); padding: 24px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-size: 1.05rem; font-weight: 600; }
        .modal-close { background: var(--bg-color); border: none; font-size: 1.1rem; cursor: pointer; color: var(--text-secondary); width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .modal-close:hover { background: var(--danger); color: #fff; }
        .modal-body { margin-bottom: 18px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }

        /* 导出选项 */
        .export-options { display: flex; flex-direction: column; gap: 10px; }
        .export-option { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
        .export-option:hover { background: var(--accent-soft); border-color: var(--accent); }
        .export-option.selected { background: var(--accent-soft); border-color: var(--accent); }
        .export-option input { display: none; }
        .export-option .icon { font-size: 1.3rem; }
        .export-option .info { flex: 1; }
        .export-option .info .title { font-weight: 600; font-size: 0.88rem; }
        .export-option .info .desc { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }

        @media (max-width: 860px) {
            .sidebar { position: fixed; left: -260px; top: 0; z-index: 100; transition: left 0.25s; box-shadow: 2px 0 20px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            .menu-toggle { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 9px; background: #fff; cursor: pointer; font-size: 1.1rem; }
            .content { padding: 18px 16px 70px; }
            .filter-row { flex-direction: column; }
            .log-table { font-size: 0.75rem; }
            .log-table th, .log-table td { padding: 8px 10px; }
            .log-message { max-width: 180px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
            .backdrop.show { display: block; }
        }
    </style>
</head>
<body>
<div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><h1>🎵 Music Bot</h1><p>配置中心</p></div>
        <nav class="nav-list">
            <a class="nav-item" href="/"><span class="nav-icon">⚙️</span><span class="nav-label">配置管理</span></a>
            <a class="nav-item" href="/playlists"><span class="nav-icon">📋</span><span class="nav-label">歌单订阅</span></a>
            <a class="nav-item active" href="/logs"><span class="nav-icon">📜</span><span class="nav-label">日志查看</span></a>
            <a class="nav-item" href="/account"><span class="nav-icon">👤</span><span class="nav-label">账号管理</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="">⚙️ 配置管理</a>
            <a href="/playlists" class="">📋 歌单订阅</a>
            <a href="/account" class="">👤 账号管理</a>
            <a href="/logout" class="danger">🚪 退出登录</a>
        </div>
    </aside>

    <main class="content">
        <div class="content-inner">
            <div class="content-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <h2>📜 日志查看</h2>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success btn-small" onclick="showExportModal()">📥 导出日志</button>
                    <button class="btn btn-warning btn-small" onclick="exportMetadataLogs()">🏷️ 元数据日志</button>
                    <button class="btn btn-danger btn-small" onclick="showClearModal()">🗑️ 清理</button>
                </div>
            </div>

            <!-- 统计 -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card"><div class="stat-value" id="totalLogs">-</div><div class="stat-label">总日志</div></div>
                <div class="stat-card info"><div class="stat-value" id="infoLogs">-</div><div class="stat-label">INFO</div></div>
                <div class="stat-card warning"><div class="stat-value" id="warningLogs">-</div><div class="stat-label">WARNING</div></div>
                <div class="stat-card error"><div class="stat-value" id="errorLogs">-</div><div class="stat-label">ERROR</div></div>
                <div class="stat-card success"><div class="stat-value" id="metadataLogs">-</div><div class="stat-label">元数据</div></div>
            </div>

            <!-- 过滤器 -->
            <div class="card">
                <div class="card-title">筛选条件</div>
                <div class="filter-row">
                    <div class="filter-group"><label>级别</label><select id="filterLevel"><option value="">全部</option><option value="DEBUG">DEBUG</option><option value="INFO">INFO</option><option value="WARNING">WARNING</option><option value="ERROR">ERROR</option></select></div>
                    <div class="filter-group"><label>类别</label><select id="filterCategory"><option value="">全部</option><option value="metadata">元数据</option><option value="download">下载</option><option value="telegram">Telegram</option><option value="general">常规</option></select></div>
                    <div class="filter-group" style="flex:2;"><label>搜索关键词</label><input type="text" id="filterSearch" placeholder="搜索日志内容..."></div>
                    <div class="filter-group" style="flex:0;"><label>&nbsp;</label><button class="btn btn-primary" onclick="applyFilter()" style="width:100%;">筛选</button></div>
                    <div class="filter-group" style="flex:0;"><label>&nbsp;</label><button class="btn btn-secondary" onclick="resetFilter()" style="width:100%;">重置</button></div>
                </div>
            </div>

            <!-- 日志表格 -->
            <div class="log-table-container">
                <table class="log-table">
                    <thead><tr><th style="width:150px;">时间</th><th style="width:75px;">级别</th><th style="width:90px;">类别</th><th>消息</th></tr></thead>
                    <tbody id="logTableBody"><tr><td colspan="4"><div class="loading"><div class="spinner"></div><p>加载中...</p></div></td></tr></tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="pagination">
                <button id="prevPage" onclick="prevPage()">上一页</button>
                <span class="page-info" id="pageInfo">第 1 页</span>
                <button id="nextPage" onclick="nextPage()">下一页</button>
            </div>
        </div>
    </main>
</div>

<!-- 导出模态框 -->
<div class="modal" id="exportModal">
    <div class="modal-content">
        <div class="modal-header"><h3>📥 导出日志</h3><button class="modal-close" onclick="closeModal('exportModal')">×</button></div>
        <div class="modal-body">
            <p style="margin-bottom:14px;color:var(--text-secondary);font-size:0.85rem;">选择导出格式：</p>
            <div class="export-options">
                <label class="export-option selected" onclick="selectExportFormat('json')"><input type="radio" name="fmt" value="json" checked><span class="icon">📄</span><div class="info"><div class="title">JSON 格式</div><div class="desc">结构化数据，便于程序处理</div></div></label>
                <label class="export-option" onclick="selectExportFormat('csv')"><input type="radio" name="fmt" value="csv"><span class="icon">📊</span><div class="info"><div class="title">CSV 格式</div><div class="desc">表格格式，可用 Excel 打开</div></div></label>
                <label class="export-option" onclick="selectExportFormat('txt')"><input type="radio" name="fmt" value="txt"><span class="icon">📝</span><div class="info"><div class="title">TXT 格式</div><div class="desc">纯文本，便于阅读</div></div></label>
            </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('exportModal')">取消</button><button class="btn btn-primary" onclick="doExport()">导出</button></div>
    </div>
</div>

<!-- 清理模态框 -->
<div class="modal" id="clearModal">
    <div class="modal-content">
        <div class="modal-header"><h3>🗑️ 清理日志</h3><button class="modal-close" onclick="closeModal('clearModal')">×</button></div>
        <div class="modal-body">
            <p style="margin-bottom:14px;color:var(--text-secondary);font-size:0.85rem;">选择清理范围：</p>
            <div class="filter-group" style="margin-bottom:12px;"><label>清理此日期之前的日志</label><input type="date" id="clearBeforeDate"></div>
            <div class="filter-group"><label>指定类别（留空清理全部）</label><select id="clearCategory"><option value="">全部类别</option><option value="metadata">元数据</option><option value="download">下载</option><option value="telegram">Telegram</option><option value="general">常规</option></select></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('clearModal')">取消</button><button class="btn btn-danger" onclick="doClear()">清理</button></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentPage = 1, pageSize = 50, totalLogs = 0, selectedFormat = 'json';

function showToast(msg, type='info') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; setTimeout(()=>t.classList.remove('show'),3000); }
function toggleSidebar(open) { const sb=document.getElementById('sidebar'),bd=document.getElementById('backdrop'); const w=open===undefined?!sb.classList.contains('open'):open; sb.classList.toggle('open',w); bd.classList.toggle('show',w); }
async function fetchWithAuth(url,o={}){const r=await fetch(url,o);if(r.status===401){location.href='/login';throw'未登录'}return r}

async function loadStats() {
    try { const r=await fetchWithAuth('/api/logs/stats'); const d=await r.json(); if(d.success){const s=d.data; document.getElementById('totalLogs').textContent=s.total||0; document.getElementById('infoLogs').textContent=s.by_level?.INFO||0; document.getElementById('warningLogs').textContent=s.by_level?.WARNING||0; document.getElementById('errorLogs').textContent=s.by_level?.ERROR||0; document.getElementById('metadataLogs').textContent=s.metadata_count||0;} } catch(e){console.error(e)}
}

async function loadLogs() {
    const tb=document.getElementById('logTableBody');
    tb.innerHTML='<tr><td colspan="4"><div class="loading"><div class="spinner"></div><p>加载中...</p></div></td></tr>';
    try{
        const lv=document.getElementById('filterLevel').value, cat=document.getElementById('filterCategory').value, srch=document.getElementById('filterSearch').value;
        const p=new URLSearchParams({limit:pageSize,offset:(currentPage-1)*pageSize});
        if(lv)p.append('level',lv);if(cat)p.append('category',cat);if(srch)p.append('search',srch);
        const r=await fetchWithAuth(`/api/logs?${p}`), d=await r.json();
        if(d.success){totalLogs=d.data.total;renderLogs(d.data.logs);updatePagination();} else tb.innerHTML=`<tr><td colspan="4"><div class="empty-state"><div class="icon">❌</div><h3>加载失败</h3></div></td></tr>`;
    } catch(e){console.error(e);tb.innerHTML=`<tr><td colspan="4"><div class="empty-state"><div class="icon">❌</div><h3>加载失败</h3></div></td></tr>`;}
}

function renderLogs(logs){
    const tb=document.getElementById('logTableBody');
    if(!logs?.length){tb.innerHTML=`<tr><td colspan="4"><div class="empty-state"><div class="icon">📭</div><h3>暂无日志</h3><p>系统运行时会产生日志记录</p></div></td></tr>`;return}
    tb.innerHTML=logs.map(log=>`<tr><td class="log-time">${formatTime(log.timestamp)}</td><td><span class="log-level ${log.level}">${log.level}</span></td><td><span class="log-category ${log.category||''}">${log.category||'general'}</span></td><td class="log-message">${escHtml(log.message)}</td></tr>`).join('');
}
function formatTime(ts){if(!ts)return'-';return new Date(ts).toLocaleString('zh-CN')}
function escHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function updatePagination(){const tp=Math.ceil(totalLogs/pageSize)||1;document.getElementById('pageInfo').textContent=`第 ${currentPage}/${tp} 页 (共${totalLogs}条)`;document.getElementById('prevPage').disabled=currentPage<=1;document.getElementById('nextPage').disabled=currentPage>=tp}
function prevPage(){if(currentPage>1){currentPage--;loadLogs()}}
function nextPage(){if(currentPage<Math.ceil(totalLogs/pageSize)){currentPage++;loadLogs()}}
function applyFilter(){currentPage=1;loadLogs()}
function resetFilter(){document.getElementById('filterLevel').value='';document.getElementById('filterCategory').value='';document.getElementById('filterSearch').value='';currentPage=1;loadLogs()}

function showExportModal(){document.getElementById('exportModal').classList.add('show')}
function selectExportFormat(f){selectedFormat=f;document.querySelectorAll('.export-option').forEach(e=>e.classList.remove('selected'));event.currentTarget.classList.add('selected')}
function doExport(){
    const lv=document.getElementById('filterLevel').value,cat=document.getElementById('filterCategory').value,p=new URLSearchParams({format:selectedFormat});
    if(lv)p.append('level',lv);if(cat)p.append('category',cat);
    location.href=`/api/logs/export?${p}`;closeModal('exportModal');showToast('开始导出','success')
}
function exportMetadataLogs(){location.href='/api/logs/export?format=json&category=metadata';showToast('导出元数据日志','success')}
function showClearModal(){document.getElementById('clearModal').classList.add('show')}
async function doClear(){
    const date=document.getElementById('clearBeforeDate').value,cat=document.getElementById('clearCategory').value;
    if(!date&&!cat){if(!confirm('确定清理所有日志？不可撤销！'))return}
    try{const r=await fetchWithAuth('/api/logs/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({before_date:date||null,category:cat||null})});const d=await r.json();d.success?(showToast(d.message,'success'),closeModal('clearModal'),loadLogs(),loadStats()):showToast(d.error||'失败','error')}catch(e){showToast('失败','error')}
}
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.getElementById('filterSearch').addEventListener('keypress',e=>{if(e.key==='Enter')applyFilter()});
document.addEventListener('DOMContentLoaded',()=>{loadStats();loadLogs()});
</script>
</body>
</html>
