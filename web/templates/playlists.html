<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot - 歌单订阅</title>
    <style>
        /* 复用 design tokens */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-sidebar: #1e293b;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --text-tertiary: var(--gray-400);
            --text-sidebar: #e2e8f0;
            --text-sidebar-muted: var(--gray-400);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app-layout { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header { padding: var(--space-6); border-bottom: 1px solid rgba(255,255,255,0.08); }
        
        .sidebar-brand { display: flex; align-items: center; gap: var(--space-3); }
        
        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-title { font-size: 1.1rem; font-weight: 700; }
        
        .sidebar-subtitle { font-size: 0.75rem; color: var(--text-sidebar-muted); }
        
        .sidebar-nav { flex: 1; padding: var(--space-4); overflow-y: auto; }
        
        .nav-section { margin-bottom: var(--space-6); }
        
        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-sidebar-muted);
            padding: var(--space-2) var(--space-3);
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            width: 100%;
            padding: 10px var(--space-3);
            border: none;
            background: transparent;
            color: var(--text-sidebar);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            transition: all var(--transition-fast);
            margin-bottom: 2px;
            text-decoration: none;
        }
        
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        
        .nav-item.active { background: var(--primary); color: white; font-weight: 500; }
        
        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
        
        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 var(--space-8);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .topbar-title { font-size: 1.2rem; font-weight: 600; }
        
        .content-wrapper { padding: var(--space-8); max-width: 1400px; margin: 0 auto; }
        
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            margin-bottom: var(--space-6);
        }
        
        .card-header {
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-title { font-size: 1rem; font-weight: 600; }
        
        .card-body { padding: var(--space-6); }
        
        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover { background: var(--gray-200); }
        
        .btn-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .btn-danger:hover { background: #fecaca; }
        
        /* 表单 */
        .form-input {
            width: 100%;
            padding: 10px var(--space-4);
            border: 1.5px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            color: var(--text-primary);
            background: var(--bg-card);
            transition: all var(--transition-fast);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        /* 歌单卡片 */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-5);
        }
        
        .playlist-card {
            background: var(--bg-card);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            transition: all var(--transition-normal);
            cursor: pointer;
        }
        
        .playlist-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .playlist-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-soft);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: var(--space-4);
        }
        
        .playlist-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-1);
        }
        
        .playlist-meta {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }
        
        .playlist-actions {
            display: flex;
            gap: var(--space-2);
            margin-top: var(--space-3);
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            animation: slideUp 0.3s ease-out;
        }
        
        .modal-header {
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal-title { font-size: 1.1rem; font-weight: 600; }
        
        .modal-body { padding: var(--space-6); }
        
        .modal-footer {
            padding: var(--space-4) var(--space-6);
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: var(--space-3);
            justify-content: flex-end;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">🎵</div>
                    <div>
                        <div class="sidebar-title">Music Bot</div>
                        <div class="sidebar-subtitle">v2.0</div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要功能</div>
                    <a href="/" class="nav-item">
                        <span class="nav-icon">📊</span>
                        <span>仪表盘</span>
                    </a>
                    <a href="/settings" class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span>系统设置</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">数据管理</div>
                    <a href="/history" class="nav-item">
                        <span class="nav-icon">📜</span>
                        <span>下载历史</span>
                    </a>
                    <a href="/playlists" class="nav-item active">
                        <span class="nav-icon">📀</span>
                        <span>歌单订阅</span>
                    </a>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">📀 歌单订阅</div>
                <div>
                    <button class="btn btn-primary" onclick="showAddModal()">➕ 添加订阅</button>
                </div>
            </header>
            
            <div class="content-wrapper">
                <!-- 订阅列表 -->
                <div class="playlist-grid" id="playlistGrid">
                    <!-- 数据将通过 JS 填充 -->
                </div>
                
                <!-- 空状态 -->
                <div id="emptyState" style="display: none; text-align: center; padding: 64px 20px; color: var(--text-tertiary);">
                    <div style="font-size: 4rem; margin-bottom: 16px;">📀</div>
                    <div style="font-size: 1.2rem; margin-bottom: 8px;">暂无歌单订阅</div>
                    <div style="font-size: 0.9rem;">点击上方"添加订阅"按钮开始</div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 添加订阅模态框 -->
    <div class="modal-overlay" id="addModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">➕ 添加歌单订阅</div>
                <button class="btn" onclick="closeAddModal()" style="padding: 4px 8px;">✕</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 8px;">平台</label>
                    <select class="form-input" id="platformSelect">
                        <option value="netease">🎵 网易云音乐</option>
                        <option value="apple">🍎 Apple Music</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 8px;">歌单链接或 ID</label>
                    <input type="text" class="form-input" id="playlistUrl" placeholder="https://music.163.com/playlist?id=123456">
                    <div style="font-size: 0.8rem; color: var(--text-tertiary); margin-top: 4px;">支持歌单链接或直接输入 ID</div>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 8px;">下载路径（可选）</label>
                    <input type="text" class="form-input" id="playlistPath" placeholder="留空使用默认路径">
                </div>
                
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="checkbox" id="autoDownload" checked>
                    <label for="autoDownload" style="font-size: 0.9rem;">自动下载新歌曲</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addPlaylist()">✅ 添加</button>
            </div>
        </div>
    </div>
    
    <script>
        // 加载歌单
        async function loadPlaylists() {
            try {
                const response = await fetch('/api/playlists');
                const result = await response.json();
                
                if (result.success) {
                    renderPlaylists(result.data);
                }
            } catch (error) {
                console.error('加载歌单失败:', error);
            }
        }
        
        // 渲染歌单
        function renderPlaylists(playlists) {
            const grid = document.getElementById('playlistGrid');
            const empty = document.getElementById('emptyState');
            
            if (playlists.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            empty.style.display = 'none';
            
            grid.innerHTML = '';
            
            playlists.forEach(playlist => {
                const card = document.createElement('div');
                card.className = 'playlist-card';
                card.innerHTML = `
                    <div class="playlist-icon">${playlist.platform === 'netease' ? '🎵' : '🍎'}</div>
                    <div class="playlist-name">${playlist.name || '未命名歌单'}</div>
                    <div class="playlist-meta">
                        <span>📊 ${playlist.song_count || 0} 首</span>
                        <span>🔄 ${playlist.sync_count || 0} 次同步</span>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-tertiary); margin-bottom: 8px;">
                        上次同步: ${playlist.last_sync ? formatDate(playlist.last_sync) : '从未'}
                    </div>
                    <div class="playlist-actions">
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;" onclick="syncPlaylist('${playlist.id}')">🔄 同步</button>
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.85rem;" onclick="deletePlaylist('${playlist.id}')">🗑️ 删除</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        // 显示添加模态框
        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        // 关闭添加模态框
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('playlistUrl').value = '';
            document.getElementById('playlistPath').value = '';
        }
        
        // 添加歌单
        async function addPlaylist() {
            const platform = document.getElementById('platformSelect').value;
            const url = document.getElementById('playlistUrl').value;
            const path = document.getElementById('playlistPath').value;
            const autoDownload = document.getElementById('autoDownload').checked;
            
            if (!url) {
                alert('请输入歌单链接或 ID');
                return;
            }
            
            try {
                const response = await fetch('/api/playlists', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        platform: platform,
                        url: url,
                        download_path: path,
                        auto_download: autoDownload
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeAddModal();
                    loadPlaylists();
                    showToast('✅ 歌单添加成功', 'success');
                } else {
                    showToast('❌ 添加失败: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('❌ 网络错误', 'error');
            }
        }
        
        // 同步歌单
        async function syncPlaylist(id) {
            showToast('🔄 开始同步...', 'info');
            
            try {
                const response = await fetch(`/api/playlists/${id}/sync`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 同步完成', 'success');
                    loadPlaylists();
                } else {
                    showToast('❌ 同步失败', 'error');
                }
            } catch (error) {
                showToast('❌ 网络错误', 'error');
            }
        }
        
        // 删除歌单
        async function deletePlaylist(id) {
            if (!confirm('确定要删除这个歌单订阅吗？')) return;
            
            try {
                const response = await fetch(`/api/playlists/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 删除成功', 'success');
                    loadPlaylists();
                } else {
                    showToast('❌ 删除失败', 'error');
                }
            } catch (error) {
                showToast('❌ 网络错误', 'error');
            }
        }
        
        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 16px 24px;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', loadPlaylists);
    </script>
</body>
</html>
